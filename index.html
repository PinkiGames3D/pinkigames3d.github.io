<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮PinkiGames3D🎮 | Mis Proyectos</title>
    <!-- Cargamos los iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121214; 
            color: #ffffff; 
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background-color: #1a1a1e; 
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #29292e;
        }
        /* Título Principal con Mandos */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        h1 { 
            color: #ff3333; 
            font-size: 2.4rem;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .xbox-pad {
            width: 50px;
            height: 50px;
            fill: #ffffff; 
            filter: drop-shadow(0px 0px 8px rgba(255, 51, 51, 0.6));
        }
        .subtitle { 
            color: #a8a8b3; 
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        /* Títulos de las Secciones */
        .section-title {
            text-align: left;
            font-size: 1.1rem;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 15px 5px;
            border-left: 3px solid #ff3333;
            padding-left: 10px;
        }

        /* Estilo base de todos los botones */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #202024;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #29292e;
        }
        .social-btn:hover { 
            transform: translateY(-3px); 
        }

        /* Efectos HOVER para las Redes Sociales */
        .discord:hover { background-color: #5865f2; border-color: #5865f2; box-shadow: 0px 5px 15px rgba(88, 101, 242, 0.4); }
        .youtube:hover { background-color: #ff0000; border-color: #ff0000; box-shadow: 0px 5px 15px rgba(255, 0, 0, 0.4); }
        .bluesky:hover { background-color: #0285ff; border-color: #0285ff; box-shadow: 0px 5px 15px rgba(2, 133, 255, 0.4); }

        /* Iconos personalizados en SVG para los botones de las consolas */
        .btn-icon {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }

        /* Efectos HOVER para los botones de repositorios de las consolas */
        .ps5-btn:hover { 
            background-color: #00439c; 
            border-color: #00439c; 
            box-shadow: 0px 5px 15px rgba(0, 67, 156, 0.5); 
        }
        .switch-btn:hover { 
            background-color: #e60012; 
            border-color: #e60012; 
            box-shadow: 0px 5px 15px rgba(230, 0, 18, 0.5); 
        }
    </style>
</head>
