<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkiGames3D | Mis Redes</title>
    <!-- Cargamos los iconos actualizados de FontAwesome (para los logos y los mandos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #22252a; /* Fondo gris oscuro como la captura */
            color: #ffffff; 
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background-color: #2a2e35; /* Fondo del contenedor */
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.6);
            border: 1px solid #3f444e;
        }
        /* Alineación del título con los mandos a los lados */
        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        h1 { 
            color: #ff3333; /* Color rojo brillante para el nombre */
            font-size: 2.6rem;
            margin: 0;
            font-weight: bold;
        }
        .gamepad-icon {
            color: #111; /* Color oscuro para los mandos estilo Xbox/PlayStation */
            font-size: 2.8rem;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }
        .subtitle { 
            color: #cccccc; 
            font-size: 1.2rem;
            margin-bottom: 35px;
        }
        /* Estilos de los botones redondeados estilo cápsula */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #22252a;
            color: white;
            text-decoration: none;
            padding: 14px;
            margin: 0 auto 20px auto;
            max-width: 220px;
            border-radius: 50px; /* Bordes completamente redondeados */
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid #ff3333; /* Borde rojo sutil inicial */
        }
        /* Efecto al pasar el ratón por encima (iluminación) */
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 0px 15px rgba(255, 51, 51, 0.6);
            background-color: #ff3333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Contenedor del Título con los Mandos -->
        <div class="title-wrapper">
            <i class="fas fa-gamepad gamepad-icon"></i>
            <h1>PinkiGames3D</h1>
            <i class="fas fa-gamepad gamepad-icon"></i>
        </div>
        
        <p class="subtitle">¡Conéctate conmigo en mis redes!</p>

        <!-- DISCORD -->
        <a href="https://discord.com" target="_blank" class="social-btn">
            <i class="fab fa-discord"></i> Discord
        </a>

        <!-- YOUTUBE -->
        <a href="https://youtube.com" target="_blank" class="social-btn">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <!-- BLUESKY -->
        <a href="https://bsky.app" target="_blank" class="social-btn">
            <i class="fa-brands fa-bluesky"></i> Bluesky
        </a>
    </div>
</body>
</html>
