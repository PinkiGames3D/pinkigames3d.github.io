<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkiGames3D | Mis Redes</title>
    <!-- Cargamos los iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121214; 
            color: #ffffff; 
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background-color: #1a1a1e; 
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #29292e;
        }
        /* Contenedor para alinear los mandos de Xbox perfectamente a los lados */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        h1 { 
            color: #ff3333; /* Nombre en rojo brillante */
            font-size: 2.4rem;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Diseño de los mandos de Xbox de los lados */
        .gamepad-xbox {
            color: #ffffff; 
            font-size: 2.5rem;
            filter: drop-shadow(0px 0px 8px rgba(255, 51, 51, 0.6));
        }
        .subtitle { 
            color: #a8a8b3; 
            font-size: 1.1rem;
            margin-bottom: 35px;
        }
        /* Botones de las redes sociales */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #202024;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #29292e;
        }
        .social-btn:hover {
            transform: translateY(-3px);
        }
        .discord:hover { background-color: #5865f2; border-color: #5865f2; box-shadow: 0px 5px 15px rgba(88, 101, 242, 0.4); }
        .youtube:hover { background-color: #ff0000; border-color: #ff0000; box-shadow: 0px 5px 15px rgba(255, 0, 0, 0.4); }
        .bluesky:hover { background-color: #0285ff; border-color: #0285ff; box-shadow: 0px 5px 15px rgba(2, 133, 255, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Título con un mando completo a cada lado -->
        <div class="title-container">
            <i class="fas fa-gamepad gamepad-xbox"></i>
            <h1>PinkiGames3D</h1>
            <i class="fas fa-gamepad gamepad-xbox"></i>
        </div>
        
        <p class="subtitle">¡Conéctate conmigo en mis redes!</p>

        <!-- DISCORD -->
        <a href="https://discord.com" target="_blank" class="social-btn discord">
            <i class="fab fa-discord"></i> Discord
        </a>

        <!-- YOUTUBE -->
        <a href="https://youtube.com" target="_blank" class="social-btn youtube">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <!-- BLUESKY -->
        <a href="https://bsky.app" target="_blank" class="social-btn bluesky">
            <i class="fa-brands fa-bluesky"></i> Bluesky
        </a>
    </div>
</body>
</html>
